spring.application.name=exam-platform

# ← CHANGÉ : fichier persistant avec variable d'env
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/examdb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ← CHANGÉ : update au lieu de create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ← CHANGÉ : secret via variable d'environnement
jwt.secret=${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
jwt.expiration=86400000

logging.level.org.springframework.security=DEBUG
logging.level.com.exam.platform=DEBUG
logging.level.org.hibernate=ERROR
logging.level.org.springframework.web=DEBUG

# ← CHANGÉ : CORS via variable d'environnement
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}
spring.flyway.enabled=false
server.port=8080